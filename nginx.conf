server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # 업로드 한도 (백엔드 admin 이 500MB 까지 받음 — 프록시 경유 대비)
    client_max_body_size 500M;

    # 파일 서버 (Vite dev proxy 의 /api/storage 와 동일)
    location /api/storage/ {
        proxy_pass https://paste.maerchen.dev;
        proxy_ssl_server_name on;
        proxy_set_header Host paste.maerchen.dev;
    }

    # 백엔드 rest API — 호스트에 퍼블리시된 8081 로 프록시
    location /api/ {
        proxy_pass http://host.docker.internal:8081;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SPA fallback — react-router 클라이언트 라우팅
    location / {
        try_files $uri $uri/ /index.html;
    }
}
